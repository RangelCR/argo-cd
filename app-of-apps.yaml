apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-of-apps
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/RangelCR/argo-cd.git
    targetRevision: main
    path: applications

  destination:
    server: https://43902f24-b51c-4e1a-a58f-2ef2b4a86cd8.k8s.ondigitalocean.com
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true