apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-convet-dist
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/RangelCR/conversao-distancia.git
    targetRevision: main
    path: k8s

  destination:
    server: https://43902f24-b51c-4e1a-a58f-2ef2b4a86cd8.k8s.ondigitalocean.com
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true