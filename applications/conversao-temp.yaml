apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: conversao-temp
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/RangelCR/conversao-temperatura.git
    path: k8s/overlays/hml
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: hml
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
